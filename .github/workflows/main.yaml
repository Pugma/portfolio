name: main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_LOCKED: "1"
  MISE_LOCKED_VERIFY_PROVENANCE: "1"

jobs:
  fetch-deps:
    name: Fetch dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Restore pnpm store
        id: pnpm-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('mise.toml', 'pnpm-workspace.yaml', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-
      - name: Fetch dependencies
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: pnpm fetch
      - name: Save pnpm store
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}

  check:
    name: Check
    needs:
      - fetch-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Restore pnpm store
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('mise.toml', 'pnpm-workspace.yaml', 'pnpm-lock.yaml') }}
          fail-on-cache-miss: true
      - name: Install dependencies
        run: pnpm install --offline --frozen-lockfile
      - name: Run check
        run: pnpm check

  build:
    name: Build
    needs:
      - fetch-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Restore pnpm store
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('mise.toml', 'pnpm-workspace.yaml', 'pnpm-lock.yaml') }}
          fail-on-cache-miss: true
      - name: Install dependencies
        run: pnpm install --offline --frozen-lockfile
      - name: Run deploy dry run
        run: pnpm deploy:dry-run
